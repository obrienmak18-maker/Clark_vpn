name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node ───────────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mobile-app/package-lock.json'

      # ── 3. Java ───────────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ── 4. Install JS dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          cd mobile-app
          npm install --legacy-peer-deps

      # ── 5. Gradle cache ───────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile-app/android/**/*.gradle*', 'mobile-app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 6. Build release APK ─────────────────────────────────────────────────
      - name: Build Android APK (Release)
        run: |
          cd mobile-app/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 7. Upload APK ─────────────────────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ClarkVPN-Release-APK
          # Covers both signed (app-release.apk) and unsigned (app-release-unsigned.apk)
          path: mobile-app/android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: warn

      # ── 8. Upload debug APK as fallback ──────────────────────────────────────
      - name: Build Android APK (Debug — fallback)
        if: failure()
        run: |
          cd mobile-app/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK (fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ClarkVPN-Debug-APK
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
